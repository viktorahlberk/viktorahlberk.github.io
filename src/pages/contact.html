<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>

<body>

    <header>
        <ul>
            <li><a href="../../index.html">Home</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </header>

    <section>
        <div class="form-submit">
            <h2 class="subtitle">Send me a message</h2>
            <form target="_blank" action="https://formsubmit.co/ec53b3e7b37fab542d1c442d5b9bcd96" method="POST">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://viktorahlberk.github.io/src/pages/thankyou.html">
                <div class="form-row">
                    <input name="name" class="form-control" placeholder="Your Name" required>
                    <input name="email" class="form-control" placeholder="Your Email" required>
                </div>
                <textarea placeholder="Message" name="message" rows="10" required></textarea>
                <button type="submit">Send</button>
            </form>
        </div>

    </section>


    <footer>
        <span>&copy; 2026 Viktor Ahlberk</span>
        <ul>
            <li><a href="https://www.github.com/viktorahlberk" target="_blank">
                    <img src="../images/github-logo.png" alt="GitHub">
                </a></li>
            <li><a href="https://www.linkedin.com/in/viktorahlberk">
                    <img src="../images/linkedin-logo.png" alt="LinkedIn">
                </a></li>
        </ul>
    </footer>

</body>

</html>
